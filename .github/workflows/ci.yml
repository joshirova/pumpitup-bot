name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check code syntax
        run: |
          python -m py_compile bot.py
          python -m py_compile handlers/user_handlers.py
          python -m py_compile logic/ml/ml_model.py
          python -m py_compile logic/analyzer.py

      - name: Run basic tests
        run: |
          python -c "from logic.ml.ml_model import model; print('Model loaded:', model is not None)"
          python -c "from logic.analyzer import generate_feature_importance_plot; print('Analyzer imported successfully')"

      - name: Check for .env file (should NOT be committed)
        run: |
          if [ -f ".env" ]; then
            echo "❌ ERROR: .env file should not be in repository!"
            exit 1
          else
            echo "✅ .env file not found (as expected)"
          fi

      - name: Verify required files exist
        run: |
          test -f bot.py || { echo "❌ bot.py not found"; exit 1; }
          test -f requirements.txt || { echo "❌ requirements.txt not found"; exit 1; }
          test -f README.md || { echo "❌ README.md not found"; exit 1; }
          test -f logic/ml/ml_model.pkl || { echo "⚠️ ml_model.pkl not found (will be generated on first run)"; }
          echo "✅ All required files present"